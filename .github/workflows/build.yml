# MinecraftMobileOptimizer/.github/workflows/build.yml
name: Build MC Optimizer v1.0.0

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b
        add-to-path: true
        
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build Release APK
      run: |
        chmod +x gradlew
        ./gradlew :app:assembleRelease
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mc-optimizer-android
        path: app/build/outputs/apk/release/*.apk
        
    - name: Upload Release APK
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: app/build/outputs/apk/release/app-release.apk
        asset_name: MC-Optimizer-Android-v${{ github.event.release.tag_name }}.apk
        asset_content_type: application/vnd.android.package-archive

  build-mod:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-mod-${{ hashFiles('mod/**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-mod-
          
    - name: Build Mod
      run: |
        cd mod
        chmod +x ../gradlew
        ../gradlew build
        
    - name: Upload Mod Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mc-optimizer-mod
        path: mod/build/libs/*[0-9].jar
        
    - name: Upload Release Mod
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: mod/build/libs/mc-optimizer-mod-${{ github.event.release.tag_name }}.jar
        asset_name: MC-Optimizer-Mod-v${{ github.event.release.tag_name }}.jar
        asset_content_type: application/java-archive
